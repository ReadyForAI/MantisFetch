
services:
  mantisfetch:
    build: .
    ports:
      - "9898:9898"
    volumes:
      - ${MANTISFETCH_HOST_DOCS_DIR:-${HOME}/.mantisfetch/docs}:/root/.mantisfetch/docs
      # TLS cert/key (read-only). Empty dir = no TLS (plain http).
      - ./certs:/certs:ro
    environment:
      MANTISFETCH_DOCS_DIR: /root/.mantisfetch/docs
      # MCP server access: bearer token allows non-loopback clients (e.g. NodalOS
      # over the network); without it /mcp is loopback-only. ALLOWED_HOSTS adds
      # extra Host values (host:* = any port) past the DNS-rebinding check.
      MANTISFETCH_MCP_TOKEN: ${MANTISFETCH_MCP_TOKEN:-}
      MANTISFETCH_MCP_ALLOWED_HOSTS: ${MANTISFETCH_MCP_ALLOWED_HOSTS:-}
      # TLS (opt-in): set these in .env to serve https. Bearer over an encrypted
      # line (#702: https + bearer, no mTLS client cert). Unset → plain http.
      MANTISFETCH_TLS_CERTFILE: ${MANTISFETCH_TLS_CERTFILE:-}
      MANTISFETCH_TLS_KEYFILE: ${MANTISFETCH_TLS_KEYFILE:-}
      # LLM provider (default: gemini)
      MANTISFETCH_LLM_PROVIDER: ${MANTISFETCH_LLM_PROVIDER:-gemini}
      MANTISFETCH_LLM_VENDOR: ${MANTISFETCH_LLM_VENDOR:-openai}
      # Gemini / Google AI credentials
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # OpenAI-compatible provider settings (used when MANTISFETCH_LLM_PROVIDER=openai)
      MANTISFETCH_LLM_API_KEY: ${MANTISFETCH_LLM_API_KEY:-}
      MANTISFETCH_LLM_BASE_URL: ${MANTISFETCH_LLM_BASE_URL:-https://api.openai.com/v1}
      MANTISFETCH_LLM_MODEL: ${MANTISFETCH_LLM_MODEL:-}
      MANTISFETCH_OCR_MODEL: ${MANTISFETCH_OCR_MODEL:-}
      MANTISFETCH_OCR_IMAGE_INPUT_MODE: ${MANTISFETCH_OCR_IMAGE_INPUT_MODE:-}
      MANTISFETCH_LLM_EXTRA_BODY_JSON: ${MANTISFETCH_LLM_EXTRA_BODY_JSON:-}
      MANTISFETCH_OCR_EXTRA_BODY_JSON: ${MANTISFETCH_OCR_EXTRA_BODY_JSON:-}
      MANTISFETCH_DOC_ID_STRATEGY: ${MANTISFETCH_DOC_ID_STRATEGY:-counter}
      MANTISFETCH_MAX_CONCURRENT_PARSE: ${MANTISFETCH_MAX_CONCURRENT_PARSE:-2}
      MANTISFETCH_LOCAL_OCR_CONCURRENCY: ${MANTISFETCH_LOCAL_OCR_CONCURRENCY:-1}
      MANTISFETCH_PREWARM_LOCAL_OCR: ${MANTISFETCH_PREWARM_LOCAL_OCR:-true}
      MANTISFETCH_DEFERRED_SUMMARY_MAX_CONCURRENT: ${MANTISFETCH_DEFERRED_SUMMARY_MAX_CONCURRENT:-1}
      MANTISFETCH_SUMMARY_BATCH_CONCURRENCY: ${MANTISFETCH_SUMMARY_BATCH_CONCURRENCY:-1}
      MANTISFETCH_SUMMARY_REQUEST_MIN_INTERVAL_SEC: ${MANTISFETCH_SUMMARY_REQUEST_MIN_INTERVAL_SEC:-2.0}
      MANTISFETCH_SUMMARY_SECTION_DETAIL_LIMIT: ${MANTISFETCH_SUMMARY_SECTION_DETAIL_LIMIT:-10}
      # Web search (opt-in): unset MANTISFETCH_SEARCH_PROVIDER = search disabled
      # (/web/search* 404, MCP search tools not registered). With the `search`
      # profile below, set MANTISFETCH_SEARCH_PROVIDER=searxng — the SearXNG URL
      # defaults to the in-compose service.
      MANTISFETCH_SEARCH_PROVIDER: ${MANTISFETCH_SEARCH_PROVIDER:-}
      MANTISFETCH_SEARCH_FALLBACK: ${MANTISFETCH_SEARCH_FALLBACK:-}
      MANTISFETCH_SEARXNG_URL: ${MANTISFETCH_SEARXNG_URL:-http://searxng:8080}
      MANTISFETCH_SEARCH_API_KEY: ${MANTISFETCH_SEARCH_API_KEY:-}
      MANTISFETCH_SEARCH_MAX_RESULTS: ${MANTISFETCH_SEARCH_MAX_RESULTS:-10}
      MANTISFETCH_SEARCH_MIN_INTERVAL_SEC: ${MANTISFETCH_SEARCH_MIN_INTERVAL_SEC:-2}
    restart: unless-stopped

  # Zero-cost self-hosted metasearch for MANTISFETCH_SEARCH_PROVIDER=searxng.
  # Opt-in: `docker compose --profile search up` starts it alongside MantisFetch.
  # Settings live in ./configs/searxng/ (settings.yml = international default;
  # settings.cn.yml = China preset — see the README "Web search" section).
  searxng:
    image: searxng/searxng:latest
    profiles: [search]
    volumes:
      - ./configs/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    restart: unless-stopped
