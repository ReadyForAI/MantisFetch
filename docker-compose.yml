
services:
  mantisfetch:
    build: .
    ports:
      - "9898:9898"
    volumes:
      - ${MANTISFETCH_HOST_DOCS_DIR:-${HOME}/.mantisfetch/docs}:/root/.mantisfetch/docs
    environment:
      MANTISFETCH_DOCS_DIR: /root/.mantisfetch/docs
      # LLM provider (default: gemini)
      MANTISFETCH_LLM_PROVIDER: ${MANTISFETCH_LLM_PROVIDER:-gemini}
      MANTISFETCH_LLM_VENDOR: ${MANTISFETCH_LLM_VENDOR:-openai}
      # Gemini / Google AI credentials
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # OpenAI-compatible provider settings (used when MANTISFETCH_LLM_PROVIDER=openai)
      MANTISFETCH_LLM_API_KEY: ${MANTISFETCH_LLM_API_KEY:-}
      MANTISFETCH_LLM_BASE_URL: ${MANTISFETCH_LLM_BASE_URL:-https://api.openai.com/v1}
      MANTISFETCH_LLM_MODEL: ${MANTISFETCH_LLM_MODEL:-}
      MANTISFETCH_OCR_MODEL: ${MANTISFETCH_OCR_MODEL:-}
      MANTISFETCH_OCR_IMAGE_INPUT_MODE: ${MANTISFETCH_OCR_IMAGE_INPUT_MODE:-}
      MANTISFETCH_LLM_EXTRA_BODY_JSON: ${MANTISFETCH_LLM_EXTRA_BODY_JSON:-}
      MANTISFETCH_OCR_EXTRA_BODY_JSON: ${MANTISFETCH_OCR_EXTRA_BODY_JSON:-}
      MANTISFETCH_DOC_ID_STRATEGY: ${MANTISFETCH_DOC_ID_STRATEGY:-counter}
      MANTISFETCH_MAX_CONCURRENT_PARSE: ${MANTISFETCH_MAX_CONCURRENT_PARSE:-2}
      MANTISFETCH_LOCAL_OCR_CONCURRENCY: ${MANTISFETCH_LOCAL_OCR_CONCURRENCY:-1}
      MANTISFETCH_PREWARM_LOCAL_OCR: ${MANTISFETCH_PREWARM_LOCAL_OCR:-true}
      MANTISFETCH_DEFERRED_SUMMARY_MAX_CONCURRENT: ${MANTISFETCH_DEFERRED_SUMMARY_MAX_CONCURRENT:-1}
      MANTISFETCH_SUMMARY_BATCH_CONCURRENCY: ${MANTISFETCH_SUMMARY_BATCH_CONCURRENCY:-1}
      MANTISFETCH_SUMMARY_REQUEST_MIN_INTERVAL_SEC: ${MANTISFETCH_SUMMARY_REQUEST_MIN_INTERVAL_SEC:-2.0}
      MANTISFETCH_SUMMARY_SECTION_DETAIL_LIMIT: ${MANTISFETCH_SUMMARY_SECTION_DETAIL_LIMIT:-10}
    restart: unless-stopped
