name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint
        run: ruff check .

      - name: Test
        # e2e is excluded: it needs a real browser (playwright install), an LLM
        # key, and network egress. The real-Chromium smoke test skips cleanly
        # when Chromium is absent, so it stays green here too.
        run: pytest tests/ --ignore=tests/e2e -v --tb=short
